          content="Página de contato do portfólio acadêmico de Leonardo Ribeiro Costa.">

    <title>Contato | Leonardo R. Costa</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

    <div class="logo">

        <span>&lt;LR.Costa /&gt;</span>

    </div>

    <nav>

                   class="active">
                    Contato
                </a>
            </li>

        </ul>

    </nav>

    <button id="btn-tema"
            aria-label="Alternar tema">

        Tema

    </button>

</header>


<main>

    <section>

        <h2>

            Entre em Contato

        </h2>

        <p class="subtitulo-contato">

            Caso queira conversar ou conhecer mais sobre meus estudos, você pode utilizar o formulário abaixo.

        </p>

    </section>



    <section class="formulario">

        <form>

            <fieldset>

                <legend>

                    Formulário de Contato

                </legend>



                <div class="campo">

                    <label for="nome">

                        Nome

                    </label>

                    <input
                        type="text"
                        id="nome"
                        placeholder="Digite seu nome"
                        required>

                </div>



                <div class="campo">

                    <label for="email">

                        E-mail

                    </label>

                    <input
                        type="email"
                        id="email"
                        placeholder="Digite seu e-mail"
                        required>

                </div>



                <div class="campo">

                    <label for="mensagem">

                        Mensagem

                    </label>

                    <textarea
                        id="mensagem"
                        rows="6"
                        placeholder="Digite sua mensagem"
                        required>

                    </textarea>

                </div>



                <button
                    type="submit"
                    class="btn-principal">

                    Enviar

                </button>

            </fieldset>

        </form>

    </section>

</main>
